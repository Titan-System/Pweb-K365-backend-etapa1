openapi: 3.0.3
info:
  title: API K365 - Etapa 1
  version: 1.0.0
  description: |
    Backend RESTful para una aplicación SPA de kiosco inspirada en K365.
    Esta primera etapa usa persistencia en memoria y cubre productos, carrito y total de compra.
servers:
  - url: http://127.0.0.1:5000
paths:
  /api/health:
    get:
      summary: Verifica que la API esté funcionando
      responses:
        '200':
          description: Servicio activo
  /api/products:
    get:
      summary: Lista los productos disponibles
      responses:
        '200':
          description: Lista de productos
  /api/products/{product_id}:
    get:
      summary: Obtiene un producto por ID
      parameters:
        - in: path
          name: product_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Producto encontrado
        '404':
          description: Producto no encontrado
  /api/cart:
    get:
      summary: Consulta el carrito actual
      responses:
        '200':
          description: Carrito actual
    delete:
      summary: Vacía el carrito
      responses:
        '200':
          description: Carrito vacío
  /api/cart/items:
    post:
      summary: Agrega un producto al carrito
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
              properties:
                product_id:
                  type: integer
                  example: 1
                quantity:
                  type: integer
                  example: 2
      responses:
        '201':
          description: Producto agregado al carrito
        '400':
          description: Datos inválidos
        '404':
          description: Producto no encontrado
        '409':
          description: Stock insuficiente
  /api/cart/items/{product_id}:
    delete:
      summary: Elimina un producto del carrito
      parameters:
        - in: path
          name: product_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Producto eliminado
        '404':
          description: El producto no estaba en el carrito
  /api/cart/total:
    get:
      summary: Calcula el total de la compra
      responses:
        '200':
          description: Total de compra
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        price:
          type: integer
        description:
          type: string
        stock:
          type: integer
        image_url:
          type: string
    CartItem:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: integer
        subtotal:
          type: integer
    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        total:
          type: integer
        items_count:
          type: integer
